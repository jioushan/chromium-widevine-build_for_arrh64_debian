name: Build Chromium + Widevine (aarch64 cross-compile)

on:
  schedule:
    - cron: '0 3 * * 1'  # 每周一 UTC 03:00
  workflow_dispatch:
    inputs:
      chromium_version:
        description: 'Chromium version tag (empty = latest stable)'
        required: false

env:
  DEPOT_TOOLS: /tmp/depot_tools
  CHROMIUM: /tmp/chromium/src
  OUT: out/Release

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 340

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ========== 极限清理磁盘 ==========
      - name: Free disk space
        run: |
          echo "=== BEFORE ==="
          df -h /
          sudo swapoff -a && sudo rm -f /swapfile
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /usr/local/share/powershell /usr/local/.ghcup
          sudo rm -rf /usr/share/swift /usr/local/graalvm /usr/local/share/chromium
          sudo rm -rf /usr/share/miniconda /usr/local/lib/node_modules
          sudo apt-get purge -y '^dotnet-.*' '^aspnetcore-.*' '^llvm-.*' '^ghc-.*' 2>/dev/null
          sudo apt-get autoremove -y
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          echo "=== AFTER ==="
          df -h /

      # ========== 系统依赖 ==========
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3 git curl lsb-release wget pkg-config gperf \
            g++-aarch64-linux-gnu gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            libxml2-utils xsltproc \
            squashfs-tools
          sudo rm -rf /var/lib/apt/lists/*

      # ========== depot_tools ==========
      - name: Setup depot_tools
        run: |
          git clone --depth 1 https://chromium.googlesource.com/chromium/tools/depot_tools.git $DEPOT_TOOLS
          echo "$DEPOT_TOOLS" >> $GITHUB_PATH

      # ========== 获取 Chromium 源码 ==========
      - name: Fetch Chromium source
        run: |
          mkdir -p /tmp/chromium && cd /tmp/chromium

          cat > .gclient << 'EOF'
          solutions = [{"name": "src", "url": "https://chromium.googlesource.com/chromium/src.git", "managed": False}]
          target_os = ["linux"]
          EOF

          # 确定版本
          if [ -n "${{ inputs.chromium_version }}" ]; then
            VERSION="${{ inputs.chromium_version }}"
          else
            VERSION=$(curl -s 'https://chromiumdash.appspot.com/fetch/releases?channel=Stable&platform=Linux&num=1' | \
              python3 -c "import sys,json; print(json.load(sys.stdin)[0]['version'])" 2>/dev/null || echo "main")
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "=== Chromium $VERSION ==="

          cd src && git init
          git fetch --depth 1 https://chromium.googlesource.com/chromium/src.git "refs/tags/$VERSION" || \
            git fetch --depth 1 https://chromium.googlesource.com/chromium/src.git main
          git checkout FETCH_HEAD

          # 同步依赖（极限 shallow）
          gclient sync --no-history --shallow -D --nohooks

          # 安装 arm64 sysroot（交叉编译必须）
          python3 build/linux/sysroot_scripts/install-sysroot.py --arch=arm64

          # 运行 hooks
          gclient runhooks

          echo "=== Source disk usage ==="
          du -sh /tmp/chromium 2>/dev/null
          df -h /

      # ========== GN 配置 ==========
      - name: Configure (GN)
        run: |
          cd $CHROMIUM
          mkdir -p $OUT

          cat > $OUT/args.gn << 'EOF'
          # === Target (交叉编译) ===
          target_cpu = "arm64"
          target_os = "linux"

          # === 极限优化磁盘/内存 ===
          is_debug = false
          is_official_build = true
          is_component_build = false
          symbol_level = 0
          blink_symbol_level = 0
          v8_symbol_level = 0
          exclude_unwind_tables = true
          enable_resource_allowlist_generation = false

          # === Widevine + 编解码器（核心！）===
          proprietary_codecs = true
          enable_widevine = true
          ffmpeg_branding = "Chrome"

          # === 减小体积 ===
          enable_nacl = false
          use_vaapi = false
          use_system_libffi = false
          is_cfi = false
          use_thin_lto = false
          use_lld = true
          dcheck_always_on = false
          EOF

          gn gen $OUT

      # ========== 编译 ==========
      - name: Build Chromium
        run: |
          cd $CHROMIUM
          echo "=== Building with $(nproc) cores ==="
          df -h /

          # 只编译 chrome 主程序，不编译测试等
          autoninja -C $OUT -j$(nproc) chrome

          echo "=== Build disk usage ==="
          du -sh $OUT
          df -h /

      # ========== Widevine CDM 修复 ==========
      - name: Fixup Widevine CDM
        run: |
          cd $CHROMIUM
          CDM="$OUT/WidevineCdm/_platform_specific/linux_arm64/libwidevinecdm.so"

          if [ ! -f "$CDM" ]; then
            CDM=$(find $OUT -name "libwidevinecdm.so" -type f | head -1)
          fi

          echo "CDM found: $CDM"
          python3 $GITHUB_WORKSPACE/widevine_fixup.py "$CDM" "$OUT/libwidevinecdm.so"
          ls -lh "$OUT/libwidevinecdm.so"

      # ========== 打包 ==========
      - name: Package
        run: |
          cd $CHROMIUM
          V="$VERSION"
          PKG="chromium-widevine-aarch64-${V}"
          D="/tmp/$PKG"
          B="$OUT"

          mkdir -p "$D/chromium" "$D/widevine"

          # Chromium 二进制和资源
          for f in chrome chrome_crashpad_handler chrome-sandbox \
                   icudtl.dat snapshot_blob.bin v8_context_snapshot.bin \
                   resources.pak chrome_100_percent.pak chrome_200_percent.pak \
                   libEGL.so libGLESv2.so libvk_swiftshader.so libvulkan.so.1; do
            [ -f "$B/$f" ] && cp -a "$B/$f" "$D/chromium/"
          done
          [ -d "$B/locales" ] && cp -a "$B/locales" "$D/chromium/"

          # strip 二进制减小体积
          aarch64-linux-gnu-strip "$D/chromium/chrome" 2>/dev/null || true

          # Widevine CDM
          cp "$B/libwidevinecdm.so" "$D/widevine/"
          [ -f "$B/WidevineCdm/manifest.json" ] && cp "$B/WidevineCdm/manifest.json" "$D/widevine/"

          # 安装脚本
          cp "$GITHUB_WORKSPACE/widevine_fixup.py" "$D/"
          cp "$GITHUB_WORKSPACE/install.sh" "$D/"

          # 打包
          cd /tmp
          tar czf "${PKG}.tar.gz" "$PKG/"
          ls -lh "${PKG}.tar.gz"

          # 释放空间
          rm -rf "$D"

      # ========== Upload ==========
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chromium-widevine-aarch64
          path: /tmp/chromium-widevine-aarch64-*.tar.gz
          retention-days: 90

      # ========== Release ==========
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: "Chromium ${{ env.VERSION }} + Widevine (aarch64)"
          body: |
            ## Chromium ${{ env.VERSION }} with Widevine DRM

            **Target:** aarch64 Linux · 16K page size · Apple Silicon / Asahi Linux
            **Method:** x86_64 cross-compilation on GitHub Actions

            ### Install
            ```bash
            tar xzf chromium-widevine-aarch64-*.tar.gz
            cd chromium-widevine-aarch64-*
            sudo ./install.sh
            chromium-widevine
            ```

            Built $(date -u +%Y-%m-%d)
          files: /tmp/chromium-widevine-aarch64-*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
