name: Build Chromium with Widevine

on:
  schedule:
    # 每周一凌晨 3 点 UTC
    - cron: '0 3 * * 1'
  workflow_dispatch:
    inputs:
      chromium_version:
        description: 'Chromium version (leave empty for latest stable)'
        required: false
        type: string

env:
  DEPOT_TOOLS: /opt/depot_tools
  CHROMIUM_SRC: /opt/chromium-src/src
  BUILD_DIR: out/Release

jobs:
  build:
    # 使用更大的 runner（免费 tier 磁盘不够编译 Chromium）
    # 如果你有 self-hosted runner 可以改成 runs-on: [self-hosted, linux, x64]
    runs-on: ubuntu-latest-xl
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          echo "=== Before ==="
          df -h /
          sudo swapoff -a
          sudo rm -f /swapfile
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get purge -y '^dotnet-.*' '^aspnetcore-.*' 2>/dev/null || true
          sudo apt-get autoremove -y
          sudo apt-get clean
          echo "=== After ==="
          df -h /

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3 python3-pip git curl lsb-release wget \
            g++-aarch64-linux-gnu gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            libncurses5 pkg-config \
            libxml2-utils xsltproc \
            squashfs-tools \
            libglib2.0-dev-bin \
            gperf

      - name: Install depot_tools
        run: |
          git clone --depth 1 https://chromium.googlesource.com/chromium/tools/depot_tools.git ${{ env.DEPOT_TOOLS }}
          echo "${{ env.DEPOT_TOOLS }}" >> $GITHUB_PATH

      - name: Fetch Chromium source
        run: |
          mkdir -p ${{ env.CHROMIUM_SRC }}/..
          cd ${{ env.CHROMIUM_SRC }}/../..

          # 初始化 gclient 配置
          cat > .gclient << 'EOF'
          solutions = [
            {
              "name": "src",
              "url": "https://chromium.googlesource.com/chromium/src.git",
              "managed": False,
              "custom_deps": {},
              "custom_vars": {},
            },
          ]
          target_os = ["linux"]
          EOF

          # 获取指定版本或最新稳定版
          if [ -n "${{ inputs.chromium_version }}" ]; then
            VERSION="${{ inputs.chromium_version }}"
          else
            # 获取最新 milestone 的版本号
            MILESTONE=$(curl -s 'https://chromiumdash.appspot.com/fetch/milestones' | \
              python3 -c "import sys,json; ms=json.load(sys.stdin); print(ms[-1]['milestone'])" 2>/dev/null || echo "")
            if [ -n "$MILESTONE" ]; then
              VERSION=$(curl -s "https://chromiumdash.appspot.com/fetch/releases?channel=Stable&platform=Linux&num=1" | \
                python3 -c "import sys,json; r=json.load(sys.stdin); print(r[0]['version'])" 2>/dev/null || echo "main")
            else
              VERSION="main"
            fi
          fi
          echo "CHROMIUM_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Building Chromium version: $VERSION"

          # Shallow clone 节省空间
          cd src
          git init
          git fetch --depth 1 https://chromium.googlesource.com/chromium/src.git "refs/tags/$VERSION" || \
            git fetch --depth 1 https://chromium.googlesource.com/chromium/src.git main
          git checkout FETCH_HEAD

          # 同步依赖（shallow）
          gclient sync --no-history --shallow -D --nohooks

          # 安装 sysroot（交叉编译用）
          python3 build/linux/sysroot_scripts/install-sysroot.py --arch=arm64

          # 运行 hooks
          gclient runhooks

      - name: Configure (GN)
        run: |
          cd ${{ env.CHROMIUM_SRC }}
          mkdir -p ${{ env.BUILD_DIR }}

          cat > ${{ env.BUILD_DIR }}/args.gn << 'EOF'
          # === Target ===
          target_cpu = "arm64"
          target_os = "linux"

          # === Build type ===
          is_debug = false
          is_official_build = true
          is_component_build = false
          symbol_level = 0
          blink_symbol_level = 0

          # === Widevine + Proprietary codecs (核心!) ===
          proprietary_codecs = true
          enable_widevine = true
          ffmpeg_branding = "Chrome"

          # === Optimizations ===
          enable_nacl = false
          use_vaapi = false
          use_system_libffi = false
          exclude_unwind_tables = true
          enable_resource_allowlist_generation = false

          # === Reduce size ===
          is_cfi = false
          use_thin_lto = false
          EOF

          gn gen ${{ env.BUILD_DIR }}

      - name: Build
        run: |
          cd ${{ env.CHROMIUM_SRC }}
          JOBS=$(nproc)
          echo "Building with $JOBS jobs..."
          autoninja -C ${{ env.BUILD_DIR }} -j$JOBS chrome

      - name: Fixup Widevine CDM (16K page alignment)
        run: |
          cd ${{ env.CHROMIUM_SRC }}
          CDM_SRC="${{ env.BUILD_DIR }}/WidevineCdm/_platform_specific/linux_arm64/libwidevinecdm.so"
          CDM_OUT="${{ env.BUILD_DIR }}/libwidevinecdm.so"

          if [ ! -f "$CDM_SRC" ]; then
            # 尝试其他路径
            CDM_SRC=$(find ${{ env.BUILD_DIR }} -name "libwidevinecdm.so" -type f | head -1)
          fi

          if [ -f "$CDM_SRC" ]; then
            echo "Found CDM at: $CDM_SRC"
            echo "Running widevine_fixup.py..."
            python3 $GITHUB_WORKSPACE/widevine_fixup.py "$CDM_SRC" "$CDM_OUT"
            echo "Fixup complete. Output: $CDM_OUT"
            ls -lh "$CDM_OUT"
          else
            echo "ERROR: Widevine CDM not found!"
            echo "Searching build output..."
            find ${{ env.BUILD_DIR }} -name "*widevine*" -type f 2>/dev/null
            exit 1
          fi

      - name: Package
        run: |
          cd ${{ env.CHROMIUM_SRC }}
          VERSION="${{ env.CHROMIUM_VERSION }}"
          PKG_NAME="chromium-widevine-aarch64-${VERSION}"
          PKG_DIR="/tmp/${PKG_NAME}"

          mkdir -p "${PKG_DIR}/chromium"
          mkdir -p "${PKG_DIR}/widevine"

          # === Chromium 二进制和资源 ===
          echo "Packaging Chromium..."
          BUILD="${{ env.BUILD_DIR }}"

          # 主程序
          for f in chrome chrome_crashpad_handler chrome-sandbox; do
            [ -f "$BUILD/$f" ] && cp -a "$BUILD/$f" "${PKG_DIR}/chromium/"
          done
          chmod +x "${PKG_DIR}/chromium/chrome" 2>/dev/null

          # 资源文件
          for f in icudtl.dat snapshot_blob.bin v8_context_snapshot.bin \
                   resources.pak chrome_100_percent.pak chrome_200_percent.pak \
                   v8_context_snapshot.bin; do
            [ -f "$BUILD/$f" ] && cp -a "$BUILD/$f" "${PKG_DIR}/chromium/"
          done

          # 共享库
          for f in libEGL.so libGLESv2.so libvk_swiftshader.so libvulkan.so.1; do
            [ -f "$BUILD/$f" ] && cp -a "$BUILD/$f" "${PKG_DIR}/chromium/"
          done

          # Locales
          [ -d "$BUILD/locales" ] && cp -a "$BUILD/locales" "${PKG_DIR}/chromium/"

          # === Widevine CDM ===
          echo "Packaging Widevine CDM..."
          cp "$BUILD/libwidevinecdm.so" "${PKG_DIR}/widevine/"
          [ -f "$BUILD/WidevineCdm/manifest.json" ] && \
            cp "$BUILD/WidevineCdm/manifest.json" "${PKG_DIR}/widevine/"

          # === 安装脚本 ===
          cp "$GITHUB_WORKSPACE/widevine_fixup.py" "${PKG_DIR}/"
          cp "$GITHUB_WORKSPACE/LICENSE" "${PKG_DIR}/" 2>/dev/null || true

          cat > "${PKG_DIR}/install.sh" << 'EOF'
          #!/bin/bash
          set -e

          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          INSTALL_DIR="/opt/chromium-widevine"
          WIDEVINE_DIR="/var/lib/widevine"

          echo "========================================="
          echo " Chromium + Widevine Installer"
          echo " Target: aarch64 Linux (16K page size)"
          echo "========================================="
          echo

          if [ "$(uname -m)" != "aarch64" ]; then
            echo "ERROR: This package is for aarch64 systems only."
            exit 1
          fi

          if [ "$(whoami)" != "root" ]; then
            echo "ERROR: Run as root: sudo ./install.sh"
            exit 1
          fi

          echo "Installing Chromium to ${INSTALL_DIR}..."
          mkdir -p "$INSTALL_DIR"
          cp -a "$SCRIPT_DIR/chromium/"* "$INSTALL_DIR/"
          chmod +x "$INSTALL_DIR/chrome"

          echo "Installing Widevine CDM to ${WIDEVINE_DIR}..."
          mkdir -p "$WIDEVINE_DIR"
          cp "$SCRIPT_DIR/widevine/libwidevinecdm.so" "$WIDEVINE_DIR/"
          [ -f "$SCRIPT_DIR/widevine/manifest.json" ] && \
            cp "$SCRIPT_DIR/widevine/manifest.json" "$WIDEVINE_DIR/"

          # WidevineCdm 目录结构（给 Chromium 用）
          mkdir -p "$WIDEVINE_DIR/WidevineCdm/_platform_specific/linux_arm64"
          mkdir -p "$WIDEVINE_DIR/WidevineCdm/_platform_specific/linux_x64"
          ln -sf "../../../manifest.json" "$WIDEVINE_DIR/WidevineCdm/manifest.json"
          ln -sf "../../../libwidevinecdm.so" \
            "$WIDEVINE_DIR/WidevineCdm/_platform_specific/linux_arm64/libwidevinecdm.so"
          touch "$WIDEVINE_DIR/WidevineCdm/_platform_specific/linux_x64/libwidevinecdm.so"

          # Firefox GMP 路径
          mkdir -p "$WIDEVINE_DIR/gmp-widevinecdm/system-installed"
          ln -sf "../../libwidevinecdm.so" \
            "$WIDEVINE_DIR/gmp-widevinecdm/system-installed/libwidevinecdm.so"
          ln -sf "../../manifest.json" \
            "$WIDEVINE_DIR/gmp-widevinecdm/system-installed/manifest.json"

          # 启动脚本
          cat > /usr/local/bin/chromium-widevine << LAUNCHER
          #!/bin/bash
          exec "$INSTALL_DIR/chrome" \\
            --enable-features=PlatformHEVCDecoderSupport \\
            "\$@"
          LAUNCHER
          chmod +x /usr/local/bin/chromium-widevine

          # Firefox 环境变量
          cat > /etc/profile.d/chromium-widevine.sh << 'PROFILE'
          MOZ_GMP_PATH="${MOZ_GMP_PATH}${MOZ_GMP_PATH:+:}/var/lib/widevine/gmp-widevinecdm/system-installed"
          export MOZ_GMP_PATH
          PROFILE

          # systemd environment.d
          mkdir -p /usr/lib/environment.d
          cat > /usr/lib/environment.d/50-gmpwidevine.conf << 'ENVCONF'
          MOZ_GMP_PATH=/var/lib/widevine/gmp-widevinecdm/system-installed
          ENVCONF

          # Firefox pref
          FIREFOX_PREF=""
          for dir in /usr/lib/firefox-esr /usr/lib/firefox /usr/lib64/firefox; do
            if [ -d "$dir/defaults/pref" ]; then
              FIREFOX_PREF="$dir/defaults/pref"
              break
            fi
          done
          if [ -n "$FIREFOX_PREF" ]; then
            cat > "$FIREFOX_PREF/gmpwidevine.js" << 'FFPREF'
          pref("media.gmp-widevinecdm.version", "system-installed");
          pref("media.gmp-widevinecdm.visible", true);
          pref("media.gmp-widevinecdm.enabled", true);
          pref("media.gmp-widevinecdm.autoupdate", false);
          pref("media.eme.enabled", true);
          pref("media.eme.encrypted-media-encryption-scheme.enabled", true);
          FFPREF
            echo "Firefox pref installed at: $FIREFOX_PREF/gmpwidevine.js"
          fi

          # Desktop entry
          cat > /usr/share/applications/chromium-widevine.desktop << DESKTOP
          [Desktop Entry]
          Name=Chromium (Widevine)
          Comment=Web Browser with Widevine DRM
          Exec=/usr/local/bin/chromium-widevine %U
          Terminal=false
          Type=Application
          Icon=chromium
          Categories=Network;WebBrowser;
          DESKTOP

          echo
          echo "========================================="
          echo " Installation complete!"
          echo ""
          echo " Chromium:  /opt/chromium-widevine/chrome"
          echo " Launcher:  chromium-widevine"
          echo " Widevine:  $WIDEVINE_DIR"
          echo ""
          echo " Firefox will pick up Widevine after"
          echo " re-login or: source /etc/profile.d/chromium-widevine.sh"
          echo "========================================="
          EOF
          chmod +x "${PKG_DIR}/install.sh"

          # 创建 tarball
          cd /tmp
          tar czf "${PKG_NAME}.tar.gz" "${PKG_NAME}/"
          ls -lh "${PKG_NAME}.tar.gz"
          echo "VERSION=$VERSION" >> /tmp/build-info.env

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chromium-widevine-aarch64
          path: /tmp/chromium-widevine-aarch64-*.tar.gz
          retention-days: 90

      - name: Release
        if: github.event_name != 'workflow_dispatch' || inputs.chromium_version == ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.CHROMIUM_VERSION }}
          name: "Chromium ${{ env.CHROMIUM_VERSION }} + Widevine (aarch64)"
          body: |
            ## Chromium ${{ env.CHROMIUM_VERSION }} with Widevine DRM

            **Target:** aarch64 Linux · 16K page size · Apple Silicon / Asahi Linux

            ### Features
            - Widevine CDM (Netflix, Disney+, Apple Music, Spotify...)
            - H.264 / H.265 / VP8 / VP9 / AV1
            - EME (Encrypted Media Extensions)

            ### Install
            ```bash
            tar xzf chromium-widevine-aarch64-*.tar.gz
            cd chromium-widevine-aarch64-*
            sudo ./install.sh
            chromium-widevine
            ```

            Built $(date -u +%Y-%m-%d)
          files: /tmp/chromium-widevine-aarch64-*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
