# Cirrus CI - Chromium + Widevine for aarch64
# 公开仓库免费：最大 8 CPU, 32GB RAM (arm64 on AWS Graviton2)

env:
  DEBIAN_FRONTEND: noninteractive
  DEPOT_TOOLS: /tmp/depot_tools
  CHROMIUM_SRC: /tmp/chromium/src
  BUILD_DIR: out/Release

# 定时触发：每周一 UTC 03:00
only_if: $CIRRUS_BRANCH == 'main' || $CIRRUS_USER_COLLABORATOR == 'true'

task:
  name: "Build Chromium + Widevine (aarch64)"

  # arm64 原生容器，最大 8 CPU / 32GB
  arm_container:
    image: debian:trixie
    cpu: 8
    memory: 32G

  # 超时 5 小时
  timeout_in: 300m

  # 持久化磁盘（编译产物很大）
  persistent_disk:
    size: 200G
    type: ssd

  # ===== 缓存 =====
  # 缓存 depot_tools 避免每次重新下载
  depot_tools_cache:
    folder: $DEPOT_TOOLS
    fingerprint_script: echo "depot-tools-v1"

  # ===== 安装依赖 =====
  install_deps_script: |
    apt-get update
    apt-get install -y \
      git curl wget python3 python3-pip \
      lsb-release pkg-config gperf \
      build-essential clang lld llvm \
      libglib2.0-dev-bin libxml2-utils xsltproc \
      squashfs-tools nodejs npm \
      libasound2-dev libatk1.0-dev libatk-bridge2.0-dev \
      libcups2-dev libdrm-dev libgbm-dev libgtk-3-dev \
      libnss3-dev libpango1.0-dev libxcomposite-dev \
      libxdamage-dev libxrandr-dev libxkbcommon-dev \
      libwayland-dev libxcb1-dev libx11-dev \
      libcurl4-openssl-dev libpulse-dev \
      libva-dev libvulkan-dev

  # ===== depot_tools =====
  setup_depot_tools_script: |
    if [ ! -d "$DEPOT_TOOLS" ]; then
      git clone --depth 1 https://chromium.googlesource.com/chromium/tools/depot_tools.git $DEPOT_TOOLS
    fi
    export PATH="$DEPOT_TOOLS:$PATH"

  # ===== 获取 Chromium 源码 =====
  fetch_chromium_script: |
    export PATH="$DEPOT_TOOLS:$PATH"
    mkdir -p /tmp/chromium
    cd /tmp/chromium

    # gclient 配置
    cat > .gclient << 'EOF'
    solutions = [{
      "name": "src",
      "url": "https://chromium.googlesource.com/chromium/src.git",
      "managed": False,
    }]
    target_os = ["linux"]
    EOF

    # 获取最新稳定版
    VERSION=$(curl -s 'https://chromiumdash.appspot.com/fetch/releases?channel=Stable&platform=Linux&num=1' | \
      python3 -c "import sys,json; print(json.load(sys.stdin)[0]['version'])" 2>/dev/null || echo "")
    if [ -z "$VERSION" ]; then
      VERSION="main"
    fi
    echo "=== Building Chromium $VERSION ==="

    cd src
    if [ ! -d ".git" ]; then
      git init
    fi

    # Shallow fetch
    git fetch --depth 1 https://chromium.googlesource.com/chromium/src.git \
      "refs/tags/$VERSION" 2>/dev/null || \
      git fetch --depth 1 https://chromium.googlesource.com/chromium/src.git main
    git checkout FETCH_HEAD

    # 同步依赖（shallow + no history 节省空间）
    gclient sync --no-history --shallow -D --nohooks

    # 安装 sysroot
    python3 build/linux/sysroot_scripts/install-sysroot.py --arch=arm64

    # 运行 hooks
    gclient runhooks

  # ===== GN 配置 =====
  configure_script: |
    cd $CHROMIUM_SRC
    mkdir -p $BUILD_DIR

    cat > $BUILD_DIR/args.gn << 'EOF'
    is_debug = false
    is_official_build = true
    is_component_build = false
    symbol_level = 0
    blink_symbol_level = 0
    proprietary_codecs = true
    enable_widevine = true
    ffmpeg_branding = "Chrome"
    enable_nacl = false
    use_vaapi = false
    exclude_unwind_tables = true
    use_system_libffi = false
    is_cfi = false
    use_thin_lto = false
    EOF

    gn gen $BUILD_DIR

  # ===== 编译 =====
  build_script: |
    cd $CHROMIUM_SRC
    echo "=== Starting build with $(nproc) cores ==="
    autoninja -C $BUILD_DIR -j$(nproc) chrome

  # ===== Widevine CDM 修复 =====
  fixup_widevine_script: |
    cd $CHROMIUM_SRC
    CDM_SRC="$BUILD_DIR/WidevineCdm/_platform_specific/linux_arm64/libwidevinecdm.so"
    CDM_OUT="$BUILD_DIR/libwidevinecdm.so"

    if [ ! -f "$CDM_SRC" ]; then
      CDM_SRC=$(find $BUILD_DIR -name "libwidevinecdm.so" -type f | head -1)
    fi

    echo "=== Widevine CDM fixup ==="
    echo "Source: $CDM_SRC"
    python3 $CIRRUS_WORKING_DIR/widevine_fixup.py "$CDM_SRC" "$CDM_OUT"
    ls -lh "$CDM_OUT"

  # ===== 打包 =====
  package_script: |
    cd $CHROMIUM_SRC
    VERSION=$(cat chrome/VERSION | tr '\n' '.' | sed 's/\.$//')
    PKG="chromium-widevine-aarch64-${VERSION}"
    PKG_DIR="/tmp/$PKG"
    B="$BUILD_DIR"

    mkdir -p "$PKG_DIR/chromium" "$PKG_DIR/widevine"

    # Chromium 文件
    for f in chrome chrome_crashpad_handler chrome-sandbox \
             icudtl.dat snapshot_blob.bin v8_context_snapshot.bin \
             resources.pak chrome_100_percent.pak chrome_200_percent.pak \
             libEGL.so libGLESv2.so libvk_swiftshader.so libvulkan.so.1; do
      [ -f "$B/$f" ] && cp -a "$B/$f" "$PKG_DIR/chromium/"
    done
    [ -d "$B/locales" ] && cp -a "$B/locales" "$PKG_DIR/chromium/"

    # Widevine
    cp "$B/libwidevinecdm.so" "$PKG_DIR/widevine/"
    [ -f "$B/WidevineCdm/manifest.json" ] && cp "$B/WidevineCdm/manifest.json" "$PKG_DIR/widevine/"

    # 附加文件
    cp "$CIRRUS_WORKING_DIR/widevine_fixup.py" "$PKG_DIR/"
    cp "$CIRRUS_WORKING_DIR/install.sh" "$PKG_DIR/" 2>/dev/null || true

    # 如果没有 install.sh，生成一个
    if [ ! -f "$PKG_DIR/install.sh" ]; then
      cat > "$PKG_DIR/install.sh" << 'INSTALLEOF'
    #!/bin/bash
    set -e
    D="$(cd "$(dirname "$0")" && pwd)"
    echo "Installing Chromium + Widevine for aarch64..."
    [ "$(uname -m)" != "aarch64" ] && echo "ERROR: aarch64 only" && exit 1
    [ "$(whoami)" != "root" ] && echo "ERROR: sudo ./install.sh" && exit 1

    mkdir -p /opt/chromium-widevine /var/lib/widevine
    cp -a "$D/chromium/"* /opt/chromium-widevine/
    chmod +x /opt/chromium-widevine/chrome
    cp "$D/widevine/libwidevinecdm.so" /var/lib/widevine/
    [ -f "$D/widevine/manifest.json" ] && cp "$D/widevine/manifest.json" /var/lib/widevine/

    # WidevineCdm 目录
    W=/var/lib/widevine/WidevineCdm
    mkdir -p "$W/_platform_specific/linux_arm64" "$W/_platform_specific/linux_x64"
    [ -f /var/lib/widevine/manifest.json ] && ln -sf "../manifest.json" "$W/manifest.json"
    ln -sf "../../libwidevinecdm.so" "$W/_platform_specific/linux_arm64/libwidevinecdm.so"
    touch "$W/_platform_specific/linux_x64/libwidevinecdm.so"

    # Firefox GMP
    mkdir -p /var/lib/widevine/gmp-widevinecdm/system-installed
    ln -sf "../../libwidevinecdm.so" /var/lib/widevine/gmp-widevinecdm/system-installed/libwidevinecdm.so
    ln -sf "../../manifest.json" /var/lib/widevine/gmp-widevinecdm/system-installed/manifest.json

    # 启动器
    cat > /usr/local/bin/chromium-widevine << 'L'
    #!/bin/bash
    exec /opt/chromium-widevine/chrome "$@"
    L
    chmod +x /usr/local/bin/chromium-widevine

    # Firefox 环境
    mkdir -p /usr/lib/environment.d
    echo 'MOZ_GMP_PATH=/var/lib/widevine/gmp-widevinecdm/system-installed' > /usr/lib/environment.d/50-gmpwidevine.conf

    for d in /usr/lib/firefox-esr /usr/lib/firefox /usr/lib64/firefox; do
      [ -d "$d/defaults/pref" ] && cat > "$d/defaults/pref/gmpwidevine.js" << 'P'
    pref("media.gmp-widevinecdm.version", "system-installed");
    pref("media.gmp-widevinecdm.visible", true);
    pref("media.gmp-widevinecdm.enabled", true);
    pref("media.gmp-widevinecdm.autoupdate", false);
    pref("media.eme.enabled", true);
    P
    done

    echo "Done! Run: chromium-widevine"
    INSTALLEOF
      chmod +x "$PKG_DIR/install.sh"
    fi

    # 打包
    cd /tmp
    tar czf "${PKG}.tar.gz" "$PKG/"
    ls -lh "${PKG}.tar.gz"
    cp "${PKG}.tar.gz" "$CIRRUS_WORKING_DIR/"
    echo "$VERSION" > /tmp/VERSION

  # ===== Artifacts =====
  upload_artifacts:
    type: application/gzip
    path: "/tmp/chromium-widevine-aarch64-*.tar.gz"

  # ===== 发布 =====
  release_script: |
    VERSION=$(cat /tmp/VERSION 2>/dev/null || echo "unknown")
    echo "Build complete: Chromium $VERSION"
    echo "Artifact: chromium-widevine-aarch64-${VERSION}.tar.gz"
    # Cirrus CI 会自动上传 artifacts，可从 UI 下载
